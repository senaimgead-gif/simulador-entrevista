<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador de Entrevista - Correios</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: linear-gradient(135deg, #FFD200, #004B8D);
}
</style>

</head>

<body class="h-screen flex flex-col font-sans">

<header class="bg-[#004B8D] text-white p-4 text-center shadow-lg">
    <h1 class="text-xl font-bold">Simulador de Entrevista</h1>
    <p class="text-sm opacity-80">Área Financeira - Correios</p>
</header>

<main class="flex-1 overflow-y-auto p-4">
    <div id="messages" class="max-w-3xl mx-auto flex flex-col gap-3"></div>
</main>

<footer class="bg-white p-3 flex gap-2 shadow-inner">
    <textarea id="input" class="flex-1 border rounded p-2 resize-none" placeholder="Digite sua resposta..."></textarea>
    <button id="send" class="bg-yellow-400 hover:bg-yellow-500 px-4 rounded font-bold">
        Enviar
    </button>
</footer>

<script>

// 🔥 COLE SUA API KEY AQUI (temporário)
const apiKey = "AIzaSyCGjwhAsg5Z9QjQciPObPh9LTNzFgMuBY8";

let history = [];

const messages = document.getElementById("messages");
const input = document.getElementById("input");
const send = document.getElementById("send");

function addMessage(role, text) {
    const div = document.createElement("div");

    div.className = role === "user"
        ? "self-end bg-[#004B8D] text-white p-3 rounded-xl max-w-[80%]"
        : "self-start bg-white p-3 rounded-xl shadow max-w-[80%]";

    div.innerText = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    addMessage("user", text);

    history.push({
        role: "user",
        parts: [{ text }]
    });

    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: history
            })
        });

        const data = await res.json();

        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sem resposta.";

        addMessage("bot", reply);

        history.push({
            role: "model",
            parts: [{ text: reply }]
        });

    } catch (err) {
        console.error(err);
        addMessage("bot", "Erro ao conectar com a IA.");
    }
}

send.onclick = sendMessage;

input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

</script>

</body>
</html>
